  <script>
    // Trigger the fade/blur-in on the next frame so the hidden state paints first.
    requestAnimationFrame(() => document.body.classList.add("hj-intro-play"));

    // All three film photos fade in/out on scroll, like the gallery videos.
    // threshold 0 + no negative margin = triggers as soon as one pixel is visible.
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => e.target.classList.toggle("revealed", e.isIntersecting));
    }, { threshold: 0 });
    const films = [...document.querySelectorAll(".hj-film.scroll-reveal")];
    // Photos 2 & 3 reveal on scroll immediately.
    films.slice(1).forEach(el => obs.observe(el));

    // First photo joins the page-load cascade: reveal it right after the subtitle
    // (subtitle starts at 0.9s), then hand it to the scroll observer.
    if (films[0]) {
      const first = films[0];
      let handedOff = false;
      function handOffToScroll() {
        if (handedOff) return;
        handedOff = true;
        obs.observe(first);   // normal in/out fade from here on
      }

      // Timed cascade reveal.
      const cascadeTimer = setTimeout(() => {
        first.classList.add("revealed");
        setTimeout(handOffToScroll, 1100); // after the cascade reveal settles
      }, 1150);

      // Escape hatch: if the user scrolls the photo 15% into view before the
      // cascade fires, reveal it now (like normal scrolling) and skip the timer.
      const earlyObs = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && !handedOff) {
          clearTimeout(cascadeTimer);
          earlyObs.disconnect();
          first.classList.add("revealed");
          handOffToScroll();
        }
      }, { rootMargin: "0px 0px -15% 0px" });
      earlyObs.observe(first);
    }
  </script>
